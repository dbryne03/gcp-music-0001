version: 2

models:
  - name: int_track_enriched
    description: >
      Spotify track audio features joined to Last.fm charting artists via
      case-insensitive artist name substring match. One row per Spotify track
      per matching chart artist. A track with multiple charting artists will
      appear once per matched artist. dim_track deduplicates on track_id.
    columns:
      - name: track_id
        description: Spotify track URI
        tests: [not_null]
      - name: track_name
        tests: [not_null]
      - name: artists
        description: Original artist name string from Spotify — may contain multiple artists
        tests: [not_null]
      - name: album_name
      - name: track_genre
        tests: [not_null]
      - name: popularity
        description: Spotify popularity score 0–100
      - name: duration_ms
        description: Track duration in milliseconds
      - name: explicit
        description: Whether the track has explicit content
      - name: danceability
        description: Danceability score 0–1
      - name: energy
        description: Energy score 0–1
      - name: key
        description: Musical key 0–11 (C=0 … B=11)
      - name: loudness
        description: Average loudness in dB, typically –60 to 0
      - name: mode
        description: Major (1) or minor (0)
      - name: speechiness
        description: Speechiness score 0–1
      - name: acousticness
        description: Acousticness score 0–1
      - name: instrumentalness
        description: Instrumentalness score 0–1
      - name: liveness
        description: Liveness score 0–1
      - name: valence
        description: Musical positiveness score 0–1
      - name: tempo
        description: Estimated beats per minute
      - name: time_signature
        description: Estimated time signature (beats per bar), typically 3–7
      - name: artist_mbid
        description: MusicBrainz ID of the matched chart artist — nullable
      - name: chart_artist_name
        description: Artist name from the Last.fm chart used to match this track
        tests: [not_null]
