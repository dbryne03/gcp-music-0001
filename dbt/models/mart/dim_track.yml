version: 2

models:
  - name: dim_track
    description: >
      Track dimension containing Spotify audio features for all tracks by
      artists who appeared in the Last.fm charts. One row per track_id,
      deduplicated from int_track_enriched by taking the highest-popularity
      row with track_id as a deterministic tiebreaker.
    columns:
      - name: track_key
        tests: [unique, not_null]
      - name: track_id
        description: Spotify track URI
        tests: [unique, not_null]
      - name: track_name
        tests: [not_null]
      - name: artists
        description: Artist name string from Spotify — may contain multiple artists
        tests: [not_null]
      - name: album_name
      - name: track_genre
      - name: popularity
        description: Spotify popularity score 0–100
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 100
      - name: duration_ms
        description: Track duration in milliseconds
      - name: explicit
        description: Whether the track has explicit content
      - name: danceability
        description: Danceability 0–1
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 1
      - name: energy
        description: Energy 0–1
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 1
      - name: key
        description: Musical key 0–11 (C=0 … B=11)
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 11
      - name: loudness
        description: Average loudness in dB, typically –60 to 0
      - name: mode
        description: Major (1) or minor (0)
        tests:
          - accepted_values:
              values: [0, 1]
      - name: speechiness
        description: Speechiness 0–1
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 1
      - name: acousticness
        description: Acousticness 0–1
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 1
      - name: instrumentalness
        description: Instrumentalness 0–1
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 1
      - name: liveness
        description: Liveness 0–1
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 1
      - name: valence
        description: Musical positiveness 0–1
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 1
      - name: tempo
        description: Estimated beats per minute
      - name: time_signature
        description: Estimated time signature (beats per bar), typically 3–7
        tests:
          - dbt_utils.accepted_range:
              min_value: 3
              max_value: 7
