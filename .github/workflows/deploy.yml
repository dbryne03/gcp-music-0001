name: Deploy

on:
  workflow_run:
    workflows: ["Infrastructure"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:

  images:
    name: Deploy / Push images
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set derived variables
        run: |
          source infra/config.env
          echo "REGISTRY=${REGISTRY}" >> $GITHUB_ENV
          echo "DEPLOY_SHA=${{ github.event.workflow_run.head_sha || github.sha }}" >> $GITHUB_ENV

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: |
          source infra/config.env
          gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build and push extractor images
        run: |
          declare -A IMAGES=(
            ["lastfm-producer"]="lastfm-producer"
            ["lastfm-consumer"]="lastfm-consumer"
            ["musicbrainz"]="musicbrainz-extractor"
            ["spotify"]="spotify-extractor"
          )
          for DIR in "${!IMAGES[@]}"; do
            IMAGE="${REGISTRY}/${IMAGES[$DIR]}"
            docker build "extractors/${DIR}" \
              --tag "${IMAGE}:${DEPLOY_SHA}" \
              --tag "${IMAGE}:latest" \
              --label "git.sha=${DEPLOY_SHA}"
            docker push "${IMAGE}:${DEPLOY_SHA}"
            docker push "${IMAGE}:latest"
          done

      - name: Build and push dbt-runner image
        run: |
          IMAGE="${REGISTRY}/dbt-runner"
          docker build dbt \
            --tag "${IMAGE}:${DEPLOY_SHA}" \
            --tag "${IMAGE}:latest" \
            --label "git.sha=${DEPLOY_SHA}"
          docker push "${IMAGE}:${DEPLOY_SHA}"
          docker push "${IMAGE}:latest"

  workloads:
    name: Deploy / Cloud Run Jobs
    needs: [images]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: portfolio-hub-2026

      - name: Deploy Cloud Run Jobs
        env:
          DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: bash infra/deploy/jobs.sh
