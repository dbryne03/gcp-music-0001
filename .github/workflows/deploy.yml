name: Deploy
run-name: "${{ github.event.workflow_run.head_commit.message || inputs.sha && format('Manual — {0}', inputs.sha) || github.ref_name }}"

on:
  workflow_run:
    workflows: ["Infrastructure"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      sha:
        description: Git SHA to deploy — leave blank for HEAD of main
        required: false
        default: ""

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  PROJECT_ID: portfolio-hub-2026
  DOCKER_BUILDKIT: "1"
  ASTRONOMER_DEPLOYMENT: gcp-music-0001
  ASTRONOMER_WORKSPACE_ID: cmpdm68fe0jrl01jrhfml0s6f
  ASTRONOMER_DEPLOYMENT_ID: cmpe9klbe1ai101jrkez3qkpo

jobs:

  changes:
    name: Detect changed paths
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
      actions: read
    outputs:
      extractors:   ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.event == 'workflow_dispatch' || steps.filter.outputs.extractors == 'true' }}
      dbt:          ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.event == 'workflow_dispatch' || steps.filter.outputs.dbt == 'true' }}
      dags:         ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.event == 'workflow_dispatch' || steps.filter.outputs.dags == 'true' }}
      astro-image:  ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.event == 'workflow_dispatch' || steps.filter.outputs.astro-image == 'true' }}
      images:       ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.event == 'workflow_dispatch' || steps.filter.outputs.images == 'true' }}
      infra-deploy: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.event == 'workflow_dispatch' || steps.filter.outputs.infra-deploy == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.sha || github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Get base SHA for comparison
        id: base
        if: github.event_name != 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LAST=$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow "${{ github.workflow }}" \
            --branch main \
            --status success \
            --limit 1 \
            --json headSha \
            --jq '.[0].headSha' 2>/dev/null || echo "")
          echo "sha=${LAST:-HEAD~1}" >> $GITHUB_OUTPUT

      - name: Filter paths
        uses: dorny/paths-filter@v4
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          base: ${{ steps.base.outputs.sha }}
          filters: |
            extractors:
              - 'extractors/**'
            dbt:
              - 'dbt/**'
            dags:
              - 'dags/**'
            astro-image:
              - 'requirements.txt'
              - 'Dockerfile'
              - 'packages.txt'
              - '.astro/**'
            images:
              - 'extractors/**'
              - 'dbt/**'
            infra-deploy:
              - 'infra/deploy/**'

  images:
    name: Deploy / Push images
    needs: [changes]
    if: |
      (github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch') &&
      (needs.changes.outputs.images == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.sha || github.event.workflow_run.head_sha || github.sha }}

      - name: Set derived variables
        run: |
          source infra/config.env
          echo "REGISTRY=${REGISTRY}" >> $GITHUB_ENV
          echo "DEPLOY_SHA=${{ inputs.sha || github.event.workflow_run.head_sha || github.sha }}" >> $GITHUB_ENV

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: |
          source infra/config.env
          gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build and push extractor images
        if: needs.changes.outputs.extractors == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          declare -A IMAGES=(
            ["lastfm-producer"]="lastfm-producer"
            ["lastfm-consumer"]="lastfm-consumer"
            ["musicbrainz"]="musicbrainz-extractor"
            ["spotify"]="spotify-extractor"
          )
          for DIR in "${!IMAGES[@]}"; do
            IMAGE="${REGISTRY}/${IMAGES[$DIR]}"
            docker build "extractors/${DIR}" \
              --cache-from "type=gha,scope=${IMAGES[$DIR]}" \
              --cache-to "type=gha,mode=max,scope=${IMAGES[$DIR]}" \
              --tag "${IMAGE}:${DEPLOY_SHA}" \
              --tag "${IMAGE}:latest" \
              --label "git.sha=${DEPLOY_SHA}"
            docker push "${IMAGE}:${DEPLOY_SHA}"
            docker push "${IMAGE}:latest"
          done

      - name: Build and push dbt-runner image
        if: needs.changes.outputs.dbt == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          IMAGE="${REGISTRY}/dbt-runner"
          docker build dbt \
            --cache-from "type=gha,scope=dbt-runner" \
            --cache-to "type=gha,mode=max,scope=dbt-runner" \
            --tag "${IMAGE}:${DEPLOY_SHA}" \
            --tag "${IMAGE}:latest" \
            --label "git.sha=${DEPLOY_SHA}"
          docker push "${IMAGE}:${DEPLOY_SHA}"
          docker push "${IMAGE}:latest"

  workloads:
    name: Deploy / Cloud Run Jobs
    needs: [changes, images]
    if: |
      !cancelled() &&
      (needs.images.result == 'success' ||
       (needs.images.result == 'skipped' && needs.changes.outputs.infra-deploy == 'true')) &&
      (needs.changes.outputs.images == 'true' || needs.changes.outputs.infra-deploy == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.sha || github.event.workflow_run.head_sha || github.sha }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Deploy Cloud Run Jobs
        env:
          DEPLOY_SHA: ${{ inputs.sha || github.event.workflow_run.head_sha || github.sha }}
        run: bash infra/deploy/jobs.sh

      - name: Summary
        run: |
          DEPLOY_SHA="${{ inputs.sha || github.event.workflow_run.head_sha || github.sha }}"
          echo "## Cloud Run Jobs deployed" >> $GITHUB_STEP_SUMMARY
          echo "Image tag: \`${DEPLOY_SHA:0:7}\`" >> $GITHUB_STEP_SUMMARY
          echo "Environment: production" >> $GITHUB_STEP_SUMMARY

  deploy-astronomer:
    name: Deploy / Astronomer Airflow
    needs: [changes]
    if: |
      (github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch') &&
      (needs.changes.outputs.dags == 'true' || needs.changes.outputs.astro-image == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.sha || github.event.workflow_run.head_sha || github.sha }}

      - name: Install Astro CLI
        run: curl -sSL install.astronomer.io | sudo bash -s

      - name: Deploy to Astronomer
        env:
          ASTRO_API_TOKEN: ${{ secrets.ASTRONOMER_API_TOKEN }}
        run: |
          # Use dags-only (fast) when only DAG files changed; full image rebuild otherwise
          if [[ "${{ needs.changes.outputs.astro-image }}" == "true" ]] || \
             [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            DAGS_FLAG=""
          else
            DAGS_FLAG="--dags"
          fi

          attempt=0
          until astro deploy "${ASTRONOMER_DEPLOYMENT_ID}" \
                --workspace-id "${ASTRONOMER_WORKSPACE_ID}" \
                --no-dags-base-dir \
                --force \
                ${DAGS_FLAG}; do
            attempt=$((attempt + 1))
            if [ $attempt -ge 3 ]; then
              echo "Deploy failed after 3 attempts"
              exit 1
            fi
            echo "Attempt $attempt failed — retrying in 30s"
            sleep 30
          done
