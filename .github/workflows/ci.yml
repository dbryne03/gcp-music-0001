name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PROJECT_ID: portfolio-hub-2026
  REGION: europe-west2
  REGISTRY: europe-west2-docker.pkg.dev/portfolio-hub-2026/music-pipeline
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:

  # ── Validate ──────────────────────────────────────────────────────────────────

  validate-dbt:
    name: Validate / dbt parse
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dbt-bigquery
        run: pip install dbt-bigquery

      - name: Write CI dbt profile
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          gcp_music:
            target: ci
            outputs:
              ci:
                type: bigquery
                method: oauth
                project: portfolio-hub-2026
                dataset: raw
                threads: 1
          EOF

      - name: Install dbt packages
        working-directory: dbt
        run: dbt deps

      - name: Parse dbt project
        working-directory: dbt
        run: dbt parse

  validate-docker:
    name: Validate / Docker build (${{ matrix.service }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        service: [lastfm, musicbrainz, spotify]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ${{ matrix.service }} extractor image
        run: |
          docker build extractors/${{ matrix.service }} \
            --tag ${{ matrix.service }}-extractor:ci \
            --label "git.sha=${{ github.sha }}"

  # ── Deploy ────────────────────────────────────────────────────────────────────

  deploy-images:
    name: Deploy / Push extractor images
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: [validate-dbt, validate-docker]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push extractor images
        run: |
          for SERVICE in lastfm musicbrainz spotify; do
            IMAGE="${{ env.REGISTRY }}/${SERVICE}-extractor"
            docker build extractors/${SERVICE} \
              --tag "${IMAGE}:${{ github.sha }}" \
              --tag "${IMAGE}:latest" \
              --label "git.sha=${{ github.sha }}"
            docker push "${IMAGE}:${{ github.sha }}"
            docker push "${IMAGE}:latest"
          done

  deploy-infra:
    name: Deploy / Bootstrap infrastructure
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: [validate-dbt]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Bootstrap GCP resources
        run: bash infra/bootstrap.sh
