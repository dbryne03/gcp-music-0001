name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: portfolio-hub-2026
  REGION: europe-west2
  REGISTRY: europe-west2-docker.pkg.dev/portfolio-hub-2026/music-pipeline
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:

  # ── Validate (PRs and main) ───────────────────────────────────────────────────

  dbt-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dbt
        run: pip install dbt-bigquery
      - name: Create CI dbt profile
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          gcp_music:
            target: ci
            outputs:
              ci:
                type: bigquery
                method: oauth
                project: portfolio-hub-2026
                dataset: raw
                threads: 1
          EOF
      - name: dbt deps
        working-directory: dbt
        run: dbt deps
      - name: dbt parse
        working-directory: dbt
        run: dbt parse

  docker-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [lastfm, musicbrainz, spotify]
    steps:
      - uses: actions/checkout@v4
      - name: Build ${{ matrix.service }} extractor
        run: |
          docker build extractors/${{ matrix.service }} \
            -t ${{ matrix.service }}-extractor:ci

  # ── Deploy (main only) ────────────────────────────────────────────────────────

  docker-push:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [dbt-compile, docker-build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.SERVICE_ACCOUNT }}
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet
      - name: Build and push extractor images
        run: |
          for SERVICE in lastfm musicbrainz spotify; do
            IMAGE="${{ env.REGISTRY }}/${SERVICE}-extractor"
            docker build extractors/${SERVICE} \
              -t "${IMAGE}:${{ github.sha }}" \
              -t "${IMAGE}:latest"
            docker push "${IMAGE}:${{ github.sha }}"
            docker push "${IMAGE}:latest"
          done

  infra-apply:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [dbt-compile]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.SERVICE_ACCOUNT }}
      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
      - name: Bootstrap GCP resources
        run: bash infra/bootstrap.sh
