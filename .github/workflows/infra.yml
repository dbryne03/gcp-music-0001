name: Infrastructure
run-name: "${{ github.event.workflow_run.head_commit.message || github.ref_name }}"

on:
  workflow_run:
    workflows: ["Validate"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: infra-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  PROJECT_ID: portfolio-hub-2026

jobs:

  changes:
    name: Detect changed paths
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 2

      - name: Filter paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            infra:
              - 'infra/**'
              - 'dags/schemas/**'

  provision:
    name: Deploy / Provision infrastructure
    needs: [changes]
    if: |
      (github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch') &&
      (needs.changes.outputs.infra == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Enable GCP APIs
        run: bash infra/provision/apis.sh

      - name: Provision storage
        run: bash infra/provision/storage.sh

      - name: Provision BigQuery
        run: bash infra/provision/bigquery.sh

      - name: Provision Artifact Registry
        run: bash infra/provision/registry.sh

      - name: Provision Secret Manager
        run: bash infra/provision/secrets.sh

      - name: Provision IAM
        run: bash infra/provision/iam.sh

      - name: Summary
        run: |
          SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          echo "## Infrastructure provisioned" >> $GITHUB_STEP_SUMMARY
          echo "Commit: \`${SHA:0:7}\`" >> $GITHUB_STEP_SUMMARY
          echo "Environment: production" >> $GITHUB_STEP_SUMMARY
