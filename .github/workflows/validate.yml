name: Validate
run-name: "${{ github.event.pull_request.title || github.event.head_commit.message || github.ref_name }}"

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'TODO.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'TODO.md'
  workflow_dispatch:

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PROJECT_ID: portfolio-hub-2026
  DOCKER_BUILDKIT: "1"

jobs:

  changes:
    name: Detect changed paths
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    outputs:
      dbt:        ${{ steps.filter.outputs.dbt }}
      dags:       ${{ steps.filter.outputs.dags }}
      extractors: ${{ steps.filter.outputs.extractors }}
      images:     ${{ steps.filter.outputs.images }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Filter paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            dbt:
              - 'dbt/**'
            dags:
              - 'dags/**'
            extractors:
              - 'extractors/**'
            images:
              - 'extractors/**'
              - 'dbt/**'
              - 'requirements.txt'
              - 'Dockerfile'
              - 'packages.txt'
              - '.astro/**'

  dags:
    name: Validate / DAG syntax
    needs: [changes]
    if: needs.changes.outputs.dags == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check DAG syntax
        run: python -m py_compile dags/config.py dags/music_pipeline.py dags/lastfm_pipeline.py dags/musicbrainz_pipeline.py dags/spotify_pipeline.py dags/music_transform.py

  dbt:
    name: Validate / dbt parse
    needs: [changes]
    if: needs.changes.outputs.dbt == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: dbt/requirements.txt

      - name: Install dbt-bigquery
        run: pip install -r dbt/requirements.txt

      - name: Write CI dbt profile
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          gcp_music:
            target: ci
            outputs:
              ci:
                type: bigquery
                method: oauth
                project: ${{ env.PROJECT_ID }}
                dataset: raw
                threads: 1
          EOF

      - name: Install dbt packages
        working-directory: dbt
        run: dbt deps

      - name: Parse dbt project
        working-directory: dbt
        env:
          GCP_PROJECT_ID: ${{ env.PROJECT_ID }}
        run: dbt parse

  extractors:
    name: Test / ${{ matrix.service }} extractor
    needs: [changes]
    if: needs.changes.outputs.extractors == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        service: [lastfm-producer, lastfm-consumer, musicbrainz, spotify]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: extractors/${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        working-directory: extractors/${{ matrix.service }}
        run: pip install -r requirements.txt pytest

      - name: Run tests
        working-directory: extractors/${{ matrix.service }}
        run: pytest test_main.py -v

  docker:
    name: Validate / Docker build (${{ matrix.image }})
    needs: [changes]
    if: needs.changes.outputs.images == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - { dir: extractors/lastfm-producer, image: lastfm-producer }
          - { dir: extractors/lastfm-consumer, image: lastfm-consumer }
          - { dir: extractors/musicbrainz,     image: musicbrainz-extractor }
          - { dir: extractors/spotify,          image: spotify-extractor }
          - { dir: dbt,                         image: dbt-runner }
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build ${{ matrix.image }}
        run: |
          docker build "${{ matrix.dir }}" \
            --cache-from "type=gha,scope=${{ matrix.image }}" \
            --cache-to "type=gha,mode=max,scope=${{ matrix.image }}" \
            --tag "${{ matrix.image }}:ci" \
            --label "git.sha=${{ github.sha }}"
